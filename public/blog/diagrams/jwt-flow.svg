<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="authGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="898" height="698" fill="none" stroke="#c7d2fe" stroke-width="1.5" rx="16"/>

  <!-- Title -->
  <rect x="250" y="18" width="400" height="40" rx="10" fill="#ede9fe" filter="url(#shadowSm)"/>
  <text x="450" y="44" text-anchor="middle" fill="#5b21b6" font-size="15" font-weight="700" letter-spacing="0.5">JWT AUTHENTICATION FLOW</text>

  <!-- ── ACTOR BOXES ── -->
  <!-- Browser / Client -->
  <rect x="14" y="78" width="148" height="72" rx="12" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <rect x="28" y="90" width="30" height="20" rx="3" fill="white" opacity="0.25"/>
  <rect x="28" y="108" width="30" height="4" rx="1" fill="white" opacity="0.35"/>
  <line x1="43" y1="112" x2="43" y2="118" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="37" y1="118" x2="49" y2="118" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="31" y1="95" x2="54" y2="95" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="31" y1="100" x2="51" y2="100" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <text x="68" y="99" fill="white" font-size="13" font-weight="700">Browser</text>
  <text x="68" y="115" fill="#bfdbfe" font-size="11">/ SPA / Mobile</text>
  <text x="68" y="130" fill="#dbeafe" font-size="10">No session state</text>

  <!-- Auth Server -->
  <rect x="318" y="78" width="168" height="72" rx="12" fill="url(#authGrad)" filter="url(#shadow)"/>
  <rect x="332" y="90" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="332" y="99" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="332" y="108" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <circle cx="363" cy="92.5" r="3" fill="#86efac"/>
  <circle cx="363" cy="101.5" r="3" fill="#86efac"/>
  <circle cx="363" cy="110.5" r="3" fill="#fbbf24"/>
  <text x="378" y="99" fill="white" font-size="13" font-weight="700">Auth Server</text>
  <text x="378" y="115" fill="#e9d5ff" font-size="11">Issues JWT Tokens</text>
  <text x="378" y="130" fill="#ddd6fe" font-size="10">Signs with secret key</text>

  <!-- Resource API -->
  <rect x="620" y="78" width="168" height="72" rx="12" fill="url(#apiGrad)" filter="url(#shadow)"/>
  <rect x="634" y="90" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="634" y="99" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="634" y="108" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <circle cx="665" cy="92.5" r="3" fill="#86efac"/>
  <circle cx="665" cy="101.5" r="3" fill="#86efac"/>
  <circle cx="665" cy="110.5" r="3" fill="#86efac"/>
  <text x="680" y="99" fill="white" font-size="13" font-weight="700">Resource API</text>
  <text x="680" y="115" fill="#bae6fd" font-size="11">No session lookup</text>
  <text x="680" y="130" fill="#e0f2fe" font-size="10">Verifies signature only</text>

  <!-- ── LIFELINES ── -->
  <line x1="88" y1="150" x2="88" y2="658" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.6"/>
  <line x1="402" y1="150" x2="402" y2="658" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.6"/>
  <line x1="704" y1="150" x2="704" y2="658" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.6"/>

  <!-- Activation boxes -->
  <rect x="394" y="172" width="16" height="78" rx="3" fill="#7c3aed" opacity="0.35"/>
  <rect x="696" y="420" width="16" height="52" rx="3" fill="#0284c7" opacity="0.35"/>

  <!-- ── STEP 1 — POST /auth/login ── -->
  <circle cx="88" cy="158" r="14" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="88" y="163" text-anchor="middle" fill="white" font-size="12" font-weight="700">1</text>
  <line x1="103" y1="172" x2="390" y2="172" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="154" y="156" width="196" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="252" y="171" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">POST /auth/login</text>
  <text x="252" y="192" text-anchor="middle" fill="#64748b" font-size="10">{ email, password }</text>

  <!-- ── STEP 2 — Validate credentials (DB lookup, once) ── -->
  <circle cx="430" cy="210" r="14" fill="#7c3aed" filter="url(#shadowSm)"/>
  <text x="430" y="215" text-anchor="middle" fill="white" font-size="12" font-weight="700">2</text>
  <!-- Note bubble: DB lookup happens once -->
  <rect x="310" y="220" width="218" height="28" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="419" y="232" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="700">DB lookup — one time only</text>
  <text x="419" y="244" text-anchor="middle" fill="#7c3aed" font-size="10">Validate credentials → get user record</text>

  <!-- ── STEP 3 — Sign JWT + return tokens ── -->
  <circle cx="388" cy="272" r="14" fill="#7c3aed" filter="url(#shadowSm)"/>
  <text x="388" y="277" text-anchor="middle" fill="white" font-size="12" font-weight="700">3</text>
  <!-- JWT creation note -->
  <rect x="178" y="264" width="278" height="22" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="317" y="279" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">sign({ sub:42, role:"admin", exp:+15min }, SECRET)</text>

  <line x1="389" y1="296" x2="104" y2="306" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrowPurple)"/>
  <rect x="130" y="290" width="230" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="245" y="305" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="600">200 OK — { accessToken, refreshToken }</text>
  <text x="245" y="326" text-anchor="middle" fill="#64748b" font-size="10">eyJhbGci... · No session stored on server!</text>

  <!-- ── DIVIDER ── -->
  <rect x="30" y="344" width="840" height="24" rx="6" fill="#e0e7ff" opacity="0.7"/>
  <text x="450" y="360" text-anchor="middle" fill="#4338ca" font-size="11" font-weight="600" letter-spacing="0.8">EVERY SUBSEQUENT REQUEST — ZERO DATABASE CALLS</text>

  <!-- ── STEP 4 — GET /api/orders with Bearer token ── -->
  <circle cx="88" cy="384" r="14" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="88" y="389" text-anchor="middle" fill="white" font-size="12" font-weight="700">4</text>
  <line x1="103" y1="398" x2="692" y2="398" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="270" y="382" width="196" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="368" y="397" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">GET /api/orders</text>
  <text x="368" y="417" text-anchor="middle" fill="#64748b" font-size="10">Authorization: Bearer eyJhbGci... (header only — no cookie)</text>

  <!-- ── STEP 5 — Verify signature, no DB ── -->
  <circle cx="734" cy="440" r="14" fill="#0284c7" filter="url(#shadowSm)"/>
  <text x="734" y="445" text-anchor="middle" fill="white" font-size="12" font-weight="700">5</text>
  <!-- Verification box -->
  <rect x="554" y="432" width="264" height="42" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="686" y="448" text-anchor="middle" fill="#0369a1" font-size="11" font-weight="700">✓ Verify HMAC-SHA256 signature</text>
  <text x="686" y="462" text-anchor="middle" fill="#0284c7" font-size="10">Extract claims — zero DB call, pure CPU</text>
  <text x="686" y="474" text-anchor="middle" fill="#64748b" font-size="9">{ sub:42, role:"admin" } — token expires in 15 min</text>

  <!-- ── STEP 6 — 200 OK with data ── -->
  <circle cx="690" cy="498" r="14" fill="#0284c7" filter="url(#shadowSm)"/>
  <text x="690" y="503" text-anchor="middle" fill="white" font-size="12" font-weight="700">6</text>
  <line x1="689" y1="512" x2="104" y2="512" stroke="#0284c7" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrowBlue)"/>
  <rect x="310" y="496" width="198" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="409" y="511" text-anchor="middle" fill="#0369a1" font-size="12" font-weight="600">200 OK — { orders: [...] }</text>

  <!-- ── DIVIDER 2 ── -->
  <rect x="30" y="530" width="840" height="24" rx="6" fill="#fef3c7" opacity="0.8"/>
  <text x="450" y="546" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600" letter-spacing="0.8">TOKEN EXPIRED — SILENT REFRESH</text>

  <!-- ── STEP 7 — POST /auth/refresh ── -->
  <circle cx="88" cy="568" r="14" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="88" y="573" text-anchor="middle" fill="white" font-size="12" font-weight="700">7</text>
  <line x1="103" y1="578" x2="390" y2="578" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="148" y="562" width="210" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="253" y="577" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">POST /auth/refresh [cookie]</text>
  <line x1="402" y1="592" x2="104" y2="606" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrowPurple)"/>
  <rect x="148" y="594" width="215" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="256" y="609" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="600">New { accessToken } — rotate refresh</text>

  <!-- ── KEY NOTE ── -->
  <rect x="30" y="628" width="840" height="56" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="30" y="628" width="7" height="56" rx="4" fill="#10b981"/>
  <text x="52" y="648" fill="#065f46" font-size="11" font-weight="700">STATELESS:</text>
  <text x="126" y="648" fill="#475569" font-size="11">Resource Server verifies the JWT signature with a secret key only — no database or session store needed per request.</text>
  <text x="52" y="666" fill="#ef4444" font-size="11" font-weight="600">⚠ Tokens cannot be revoked before expiry.</text>
  <text x="222" y="666" fill="#475569" font-size="11">Mitigate with short TTLs (5–15 min) + refresh token rotation on every use.</text>
</svg>
