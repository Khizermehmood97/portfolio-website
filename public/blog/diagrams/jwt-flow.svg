<svg width="900" height="620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="ap" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="ao" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e293b"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0c1222" rx="16"/>
  <rect width="900" height="620" fill="url(#dots)" rx="16"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="50" fill="#0f172a" rx="16"/>
  <rect x="0" y="36" width="900" height="14" fill="#0f172a"/>
  <rect x="270" y="10" width="360" height="30" rx="7" fill="#1a0533"/>
  <text x="450" y="31" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700" letter-spacing="0.8">JWT AUTHENTICATION FLOW</text>

  <!-- ─── ACTOR: Browser ─── -->
  <rect x="25" y="62" width="150" height="60" rx="10" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <rect x="42" y="72" width="26" height="18" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="42" y="88" width="26" height="3" fill="#1e3a5f"/>
  <line x1="55" y1="91" x2="55" y2="96" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="49" y1="96" x2="61" y2="96" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="45" y1="77" x2="64" y2="77" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="81" x2="60" y2="81" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>
  <text x="78" y="80" fill="#93c5fd" font-size="14" font-weight="700">Browser</text>
  <text x="78" y="97" fill="#60a5fa" font-size="11">/ SPA / Mobile</text>

  <!-- ─── ACTOR: Auth Server ─── -->
  <rect x="295" y="62" width="175" height="60" rx="10" fill="#2e1065" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="312" y="72" width="26" height="5" rx="1.5" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <rect x="312" y="80" width="26" height="5" rx="1.5" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <rect x="312" y="88" width="26" height="5" rx="1.5" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="340" cy="74.5" r="2" fill="#4ade80"/>
  <circle cx="340" cy="82.5" r="2" fill="#4ade80"/>
  <circle cx="340" cy="90.5" r="2" fill="#fbbf24"/>
  <text x="355" y="80" fill="#c4b5fd" font-size="14" font-weight="700">Auth Server</text>
  <text x="355" y="97" fill="#a78bfa" font-size="11">Issues JWT Tokens</text>

  <!-- ─── ACTOR: Resource Server ─── -->
  <rect x="560" y="62" width="175" height="60" rx="10" fill="#1a2744" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="577" y="72" width="26" height="5" rx="1.5" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
  <rect x="577" y="80" width="26" height="5" rx="1.5" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
  <rect x="577" y="88" width="26" height="5" rx="1.5" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="605" cy="74.5" r="2" fill="#4ade80"/>
  <circle cx="605" cy="82.5" r="2" fill="#4ade80"/>
  <circle cx="605" cy="90.5" r="2" fill="#4ade80"/>
  <text x="616" y="80" fill="#7dd3fc" font-size="14" font-weight="700">Resource API</text>
  <text x="616" y="97" fill="#38bdf8" font-size="11">Verifies Signature</text>

  <!-- ─── ACTOR: Database ─── -->
  <rect x="745" y="62" width="130" height="60" rx="10" fill="#1c1008" stroke="#f59e0b" stroke-width="2"/>
  <ellipse cx="766" cy="75" rx="12" ry="4.5" fill="#451a03" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="754" y1="75" x2="754" y2="88" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="778" y1="75" x2="778" y2="88" stroke="#fbbf24" stroke-width="1.5"/>
  <ellipse cx="766" cy="88" rx="12" ry="4.5" fill="#1c1008" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="754" y1="79" x2="778" y2="79" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
  <line x1="754" y1="83" x2="778" y2="83" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
  <text x="786" y="80" fill="#fcd34d" font-size="13" font-weight="700">Database</text>
  <text x="786" y="97" fill="#fbbf24" font-size="10">Users / Tokens</text>

  <!-- ─── LIFELINES ─── -->
  <line x1="100" y1="122" x2="100" y2="590" stroke="#3b82f6" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>
  <line x1="382" y1="122" x2="382" y2="590" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>
  <line x1="647" y1="122" x2="647" y2="590" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>
  <line x1="810" y1="122" x2="810" y2="590" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>

  <!-- Activation boxes -->
  <rect x="374" y="163" width="16" height="62" rx="2" fill="#4c1d95" opacity="0.7"/>
  <rect x="374" y="370" width="16" height="32" rx="2" fill="#4c1d95" opacity="0.7"/>
  <rect x="639" y="430" width="16" height="32" rx="2" fill="#0c4a6e" opacity="0.7"/>

  <!-- ══ STEP 1 ══ POST /auth/login ══ -->
  <circle cx="126" cy="147" r="13" fill="#3b82f6"/>
  <text x="126" y="152" text-anchor="middle" fill="white" font-size="11" font-weight="700">1</text>
  <line x1="115" y1="163" x2="372" y2="163" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="243" y="156" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">POST /auth/login</text>
  <text x="243" y="174" text-anchor="middle" fill="#475569" font-size="10">{ email, password }</text>

  <!-- ══ STEP 2 ══ Validate credentials (DB lookup) ══ -->
  <circle cx="408" cy="196" r="13" fill="#8b5cf6"/>
  <text x="408" y="201" text-anchor="middle" fill="white" font-size="11" font-weight="700">2</text>
  <line x1="390" y1="210" x2="799" y2="210" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ap)"/>
  <text x="594" y="203" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">SELECT user WHERE email = ?</text>

  <!-- ══ STEP 3 ══ User record returned ══ -->
  <circle cx="786" cy="227" r="13" fill="#f59e0b"/>
  <text x="786" y="232" text-anchor="middle" fill="white" font-size="11" font-weight="700">3</text>
  <line x1="799" y1="242" x2="391" y2="242" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ao)"/>
  <text x="594" y="235" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">{ id: 42, role: "admin", hash } ✓</text>

  <!-- ══ STEP 4 ══ Sign & return JWT ══ -->
  <circle cx="358" cy="260" r="13" fill="#8b5cf6"/>
  <text x="358" y="265" text-anchor="middle" fill="white" font-size="11" font-weight="700">4</text>
  <!-- Note bubble showing JWT creation -->
  <rect x="255" y="265" width="254" height="26" rx="5" fill="#1a0533" stroke="#6d28d9" stroke-width="1"/>
  <text x="382" y="283" text-anchor="middle" fill="#c4b5fd" font-size="10">sign({ sub:42, role:"admin", exp: +15m }, SECRET)</text>
  <line x1="390" y1="300" x2="112" y2="300" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ap)"/>
  <text x="251" y="293" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">200 OK — { accessToken, refreshToken }</text>
  <text x="251" y="313" text-anchor="middle" fill="#475569" font-size="10">eyJhbGci... (JWT — no session stored on server)</text>

  <!-- ── SEPARATOR ── -->
  <line x1="50" y1="340" x2="850" y2="340" stroke="#334155" stroke-width="1" stroke-dasharray="3,4"/>
  <rect x="310" y="330" width="280" height="18" rx="5" fill="#1e293b"/>
  <text x="450" y="343" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">EVERY SUBSEQUENT REQUEST — NO DB NEEDED</text>

  <!-- ══ STEP 5 ══ GET /api/orders with token ══ -->
  <circle cx="126" cy="370" r="13" fill="#3b82f6"/>
  <text x="126" y="375" text-anchor="middle" fill="white" font-size="11" font-weight="700">5</text>
  <line x1="115" y1="386" x2="637" y2="386" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="376" y="379" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">GET /api/orders</text>
  <text x="376" y="397" text-anchor="middle" fill="#475569" font-size="10">Authorization: Bearer eyJhbGciOiJIUzI1NiJ9... (header only)</text>

  <!-- ══ STEP 6 ══ Verify signature — no DB ══ -->
  <circle cx="673" cy="420" r="13" fill="#0ea5e9"/>
  <text x="673" y="425" text-anchor="middle" fill="white" font-size="11" font-weight="700">6</text>
  <!-- Verification note -->
  <rect x="500" y="418" width="290" height="30" rx="5" fill="#0c1a33" stroke="#0369a1" stroke-width="1"/>
  <text x="645" y="431" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">Verify signature with SECRET — ✓ valid</text>
  <text x="645" y="444" text-anchor="middle" fill="#475569" font-size="10">Extract: { sub:42, role:"admin" } — zero DB call</text>

  <!-- ══ STEP 7 ══ 200 OK ══ -->
  <circle cx="623" cy="472" r="13" fill="#0ea5e9"/>
  <text x="623" y="477" text-anchor="middle" fill="white" font-size="11" font-weight="700">7</text>
  <line x1="636" y1="487" x2="112" y2="487" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ab)"/>
  <text x="374" y="480" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">200 OK — { orders: [...] }</text>

  <!-- ── KEY NOTE ── -->
  <rect x="30" y="516" width="840" height="58" rx="9" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="30" y="516" width="6" height="58" rx="3" fill="#10b981"/>
  <text x="50" y="536" fill="#34d399" font-size="11" font-weight="700">STATELESS:</text>
  <text x="122" y="536" fill="#9ca3af" font-size="11">Resource Server verifies the JWT signature using only a secret key — no database or session store call.</text>
  <text x="50" y="553" fill="#9ca3af" font-size="11">The token carries all needed claims (userId, role, expiry) inside it. Any server with the secret can validate independently.</text>
  <text x="50" y="568" fill="#f87171" font-size="11" font-weight="600">⚠ Tokens cannot be revoked before expiry — use short TTLs (5–15 min) and pair with a refresh token.</text>
</svg>
