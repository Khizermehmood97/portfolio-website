<svg width="900" height="400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e293b"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#0c1222" rx="16"/>
  <rect width="900" height="400" fill="url(#dots)" rx="16"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="50" fill="#0f172a" rx="16"/>
  <rect x="0" y="36" width="900" height="14" fill="#0f172a"/>
  <rect x="215" y="10" width="470" height="30" rx="7" fill="#2d0a0a"/>
  <text x="450" y="31" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700" letter-spacing="0.8">THE SESSION SCALING PROBLEM</text>

  <!-- ─── LOAD BALANCER ─── -->
  <rect x="345" y="65" width="210" height="52" rx="10" fill="#1c1a08" stroke="#f59e0b" stroke-width="2"/>
  <!-- load balancer icon - balance beam -->
  <line x1="365" y1="97" x2="405" y2="97" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="385" y1="81" x2="385" y2="97" stroke="#fbbf24" stroke-width="2"/>
  <line x1="370" y1="81" x2="400" y2="81" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="365" cy="97" r="3" fill="#fbbf24"/>
  <circle cx="405" cy="97" r="3" fill="#fbbf24"/>
  <text x="420" y="82" fill="#fcd34d" font-size="13" font-weight="700">Load Balancer</text>
  <text x="420" y="99" fill="#fbbf24" font-size="11">Routes requests round-robin</text>

  <!-- ─── USER (browser) ─── -->
  <rect x="388" y="170" width="124" height="44" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="403" y="178" width="18" height="13" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="412" y1="193" x2="412" y2="198" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="433" y="189" fill="#93c5fd" font-size="12" font-weight="600">Browser</text>
  <text x="433" y="204" fill="#60a5fa" font-size="10">User #42</text>

  <!-- Line from user to LB -->
  <line x1="450" y1="170" x2="450" y2="117" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ─── Lines from LB to servers ─── -->
  <line x1="395" y1="117" x2="175" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <line x1="450" y1="117" x2="450" y2="170" stroke="#64748b" stroke-width="1.5" opacity="0.3"/>
  <line x1="505" y1="117" x2="725" y2="170" stroke="#64748b" stroke-width="1.5"/>

  <!-- ─── SERVER A (logged in here) ─── -->
  <rect x="60" y="170" width="180" height="110" rx="10" fill="#0a2218" stroke="#10b981" stroke-width="2"/>
  <text x="150" y="192" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">Server A</text>
  <!-- memory store visual -->
  <rect x="78" y="202" width="144" height="64" rx="6" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="150" y="218" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">In-Memory Sessions</text>
  <rect x="86" y="223" width="128" height="14" rx="3" fill="#14532d"/>
  <text x="150" y="234" text-anchor="middle" fill="#4ade80" font-size="9">✓  sessionId: "a3f9.." → userId:42</text>
  <rect x="86" y="240" width="128" height="14" rx="3" fill="#14532d" opacity="0.5"/>
  <text x="150" y="251" text-anchor="middle" fill="#4ade80" font-size="9">✓  sessionId: "b2c1.." → userId:7</text>
  <!-- green arrow for login flow -->
  <line x1="150" y1="170" x2="150" y2="280" stroke="none"/>
  <!-- Arrow from LB to Server A labeled "Login request" -->
  <text x="150" y="300" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">✓ Login Succeeded</text>
  <text x="150" y="315" text-anchor="middle" fill="#475569" font-size="10">Session stored in memory</text>

  <!-- ─── SERVER B (session missing!) ─── -->
  <rect x="360" y="230" width="180" height="110" rx="10" fill="#1c0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="252" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700">Server B</text>
  <rect x="378" y="262" width="144" height="64" rx="6" fill="#2d0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="450" y="278" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">In-Memory Sessions</text>
  <text x="450" y="296" text-anchor="middle" fill="#f87171" font-size="10">(empty — different process)</text>
  <text x="450" y="313" text-anchor="middle" fill="#9ca3af" font-size="9">No record of "a3f9.."</text>
  <text x="450" y="355" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">✗ User appears logged out!</text>
  <text x="450" y="371" text-anchor="middle" fill="#475569" font-size="10">401 Unauthorized returned</text>

  <!-- ─── SERVER C ─── -->
  <rect x="660" y="170" width="180" height="110" rx="10" fill="#1c0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="750" y="192" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700">Server C</text>
  <rect x="678" y="202" width="144" height="64" rx="6" fill="#2d0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="750" y="218" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">In-Memory Sessions</text>
  <text x="750" y="236" text-anchor="middle" fill="#f87171" font-size="10">(empty — different process)</text>
  <text x="750" y="254" text-anchor="middle" fill="#9ca3af" font-size="9">No record of "a3f9.."</text>
  <text x="750" y="300" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">✗ User appears logged out!</text>
  <text x="750" y="315" text-anchor="middle" fill="#475569" font-size="10">401 Unauthorized returned</text>

  <!-- ─── Flow arrows ─── -->
  <!-- Step 1: login → Server A (green) -->
  <line x1="395" y1="192" x2="243" y2="175" stroke="#10b981" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="275" y="155" width="90" height="18" rx="4" fill="#052e16"/>
  <text x="320" y="168" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">① Login ✓</text>

  <!-- Step 2: next request → Server B (red) -->
  <line x1="450" y1="214" x2="450" y2="228" stroke="#ef4444" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="457" y="215" width="108" height="18" rx="4" fill="#2d0a0a"/>
  <text x="511" y="228" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">② Next request ✗</text>

  <!-- Step 3: next request → Server C (red) -->
  <line x1="505" y1="192" x2="660" y2="175" stroke="#ef4444" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="537" y="155" width="108" height="18" rx="4" fill="#2d0a0a"/>
  <text x="591" y="168" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">③ Another request ✗</text>
</svg>
