<svg width="900" height="460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8f8"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <linearGradient id="lbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="serverOkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="serverBadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="460" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="898" height="458" fill="none" stroke="#fecaca" stroke-width="1.5" rx="16"/>

  <!-- Title -->
  <rect x="195" y="16" width="510" height="40" rx="10" fill="#fee2e2" filter="url(#shadowSm)"/>
  <text x="450" y="42" text-anchor="middle" fill="#991b1b" font-size="15" font-weight="700" letter-spacing="0.5">THE SESSION SCALING PROBLEM</text>

  <!-- ── USER / BROWSER ── -->
  <rect x="376" y="72" width="148" height="52" rx="10" fill="url(#userGrad)" filter="url(#shadow)"/>
  <rect x="390" y="82" width="22" height="15" rx="2" fill="white" opacity="0.25"/>
  <line x1="401" y1="97" x2="401" y2="102" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="396" y1="102" x2="406" y2="102" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <text x="424" y="95" fill="white" font-size="13" font-weight="700">Browser</text>
  <text x="424" y="112" fill="#bfdbfe" font-size="11">User #42</text>

  <!-- arrow down from user to LB -->
  <line x1="450" y1="124" x2="450" y2="148" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ── LOAD BALANCER ── -->
  <rect x="320" y="148" width="260" height="52" rx="10" fill="url(#lbGrad)" filter="url(#shadow)"/>
  <!-- balance beam icon -->
  <line x1="344" y1="180" x2="384" y2="180" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="364" y1="163" x2="364" y2="180" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="348" y1="163" x2="380" y2="163" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <circle cx="344" cy="180" r="3" fill="white" opacity="0.7"/>
  <circle cx="384" cy="180" r="3" fill="white" opacity="0.7"/>
  <text x="404" y="170" fill="white" font-size="14" font-weight="700">Load Balancer</text>
  <text x="404" y="188" fill="#fef3c7" font-size="11">Distributes requests round-robin</text>

  <!-- arrows from LB to 3 servers -->
  <!-- To Server A -->
  <line x1="360" y1="200" x2="178" y2="248" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <!-- To Server B -->
  <line x1="450" y1="200" x2="450" y2="248" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <!-- To Server C -->
  <line x1="540" y1="200" x2="722" y2="248" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ── SERVER A (has session) ── -->
  <rect x="40" y="248" width="235" height="148" rx="12" fill="white" stroke="#10b981" stroke-width="2.5" filter="url(#shadow)"/>
  <!-- Green header -->
  <rect x="40" y="248" width="235" height="36" rx="12" fill="url(#serverOkGrad)"/>
  <rect x="40" y="268" width="235" height="16" fill="#059669"/>
  <text x="157" y="271" text-anchor="middle" fill="white" font-size="14" font-weight="700">Server A</text>
  <!-- Session store box -->
  <rect x="54" y="294" width="207" height="72" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="157" y="312" text-anchor="middle" fill="#166534" font-size="11" font-weight="700">In-Memory Sessions</text>
  <rect x="62" y="318" width="191" height="18" rx="4" fill="#dcfce7"/>
  <text x="157" y="331" text-anchor="middle" fill="#166534" font-size="10">✓  "a3f9.." → userId: 42, admin</text>
  <rect x="62" y="340" width="191" height="18" rx="4" fill="#dcfce7" opacity="0.6"/>
  <text x="157" y="353" text-anchor="middle" fill="#16a34a" font-size="10">✓  "b2c1.." → userId: 7, user</text>
  <!-- Status -->
  <text x="157" y="384" text-anchor="middle" fill="#059669" font-size="11" font-weight="700">✓ Login Succeeded</text>
  <text x="157" y="400" text-anchor="middle" fill="#64748b" font-size="10">Session stored in memory here</text>

  <!-- ── SERVER B (no session) ── -->
  <rect x="317" y="248" width="235" height="148" rx="12" fill="white" stroke="#ef4444" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="317" y="248" width="235" height="36" rx="12" fill="url(#serverBadGrad)"/>
  <rect x="317" y="268" width="235" height="16" fill="#dc2626"/>
  <text x="434" y="271" text-anchor="middle" fill="white" font-size="14" font-weight="700">Server B</text>
  <rect x="331" y="294" width="207" height="72" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="434" y="312" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="700">In-Memory Sessions</text>
  <text x="434" y="336" text-anchor="middle" fill="#ef4444" font-size="11">(empty — different process)</text>
  <text x="434" y="354" text-anchor="middle" fill="#94a3b8" font-size="10">No record of "a3f9.."</text>
  <text x="434" y="384" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700">✗ 401 Unauthorized!</text>
  <text x="434" y="400" text-anchor="middle" fill="#64748b" font-size="10">User appears logged out</text>

  <!-- ── SERVER C (no session) ── -->
  <rect x="594" y="248" width="235" height="148" rx="12" fill="white" stroke="#ef4444" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="594" y="248" width="235" height="36" rx="12" fill="url(#serverBadGrad)"/>
  <rect x="594" y="268" width="235" height="16" fill="#dc2626"/>
  <text x="711" y="271" text-anchor="middle" fill="white" font-size="14" font-weight="700">Server C</text>
  <rect x="608" y="294" width="207" height="72" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="711" y="312" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="700">In-Memory Sessions</text>
  <text x="711" y="336" text-anchor="middle" fill="#ef4444" font-size="11">(empty — different process)</text>
  <text x="711" y="354" text-anchor="middle" fill="#94a3b8" font-size="10">No record of "a3f9.."</text>
  <text x="711" y="384" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700">✗ 401 Unauthorized!</text>
  <text x="711" y="400" text-anchor="middle" fill="#64748b" font-size="10">User appears logged out</text>

  <!-- Flow labels on arrows -->
  <!-- Login → Server A (green) -->
  <rect x="155" y="218" width="100" height="20" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="205" y="231" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">① Login ✓</text>

  <!-- Next request → Server B (red) -->
  <rect x="446" y="218" width="136" height="20" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="514" y="231" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="600">② Next request ✗</text>

  <!-- Another → Server C (red) -->
  <rect x="594" y="218" width="148" height="20" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="668" y="231" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="600">③ Later request ✗</text>

  <!-- ── KEY NOTE ── -->
  <rect x="30" y="412" width="840" height="36" rx="8" fill="white" filter="url(#shadowSm)"/>
  <rect x="30" y="412" width="7" height="36" rx="4" fill="#ef4444"/>
  <text x="52" y="427" fill="#dc2626" font-size="11" font-weight="700">THE PROBLEM:</text>
  <text x="140" y="427" fill="#475569" font-size="11">Each server holds sessions in its own memory. Round-robin routing sends the user to a different server that has no record of their session.</text>
  <text x="52" y="441" fill="#475569" font-size="11">Fix: use sticky sessions (breaks load balancing) or a shared Redis store (adds infrastructure dependency).</text>
</svg>
