<svg width="900" height="620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="898" height="618" fill="none" stroke="#c7d2fe" stroke-width="1.5" rx="16"/>

  <!-- Title -->
  <rect x="220" y="18" width="460" height="40" rx="10" fill="#ede9fe" filter="url(#shadowSm)"/>
  <text x="450" y="44" text-anchor="middle" fill="#5b21b6" font-size="15" font-weight="700" letter-spacing="0.5">SESSION-BASED AUTHENTICATION FLOW</text>

  <!-- ── ACTOR BOXES ── -->
  <!-- Browser -->
  <rect x="30" y="78" width="148" height="68" rx="12" fill="url(#browserGrad)" filter="url(#shadow)"/>
  <rect x="44" y="90" width="30" height="20" rx="3" fill="white" opacity="0.25"/>
  <rect x="44" y="108" width="30" height="4" rx="1" fill="white" opacity="0.35"/>
  <line x1="59" y1="112" x2="59" y2="118" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="53" y1="118" x2="65" y2="118" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="47" y1="95" x2="70" y2="95" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="47" y1="100" x2="67" y2="100" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <text x="83" y="99" fill="white" font-size="14" font-weight="700">Browser</text>
  <text x="83" y="116" fill="#bfdbfe" font-size="11">/ Client</text>
  <text x="83" y="133" fill="#dbeafe" font-size="10">User Agent</text>

  <!-- Web Server -->
  <rect x="350" y="78" width="168" height="68" rx="12" fill="url(#serverGrad)" filter="url(#shadow)"/>
  <rect x="364" y="90" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="364" y="99" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <rect x="364" y="108" width="28" height="5" rx="2" fill="white" opacity="0.3"/>
  <circle cx="395" cy="92.5" r="3" fill="#86efac"/>
  <circle cx="395" cy="101.5" r="3" fill="#86efac"/>
  <circle cx="395" cy="110.5" r="3" fill="#fbbf24"/>
  <text x="410" y="100" fill="white" font-size="14" font-weight="700">Web Server</text>
  <text x="410" y="116" fill="#e9d5ff" font-size="11">API / Backend</text>
  <text x="410" y="133" fill="#ddd6fe" font-size="10">Validates credentials</text>

  <!-- Session Store -->
  <rect x="690" y="78" width="168" height="68" rx="12" fill="url(#storeGrad)" filter="url(#shadow)"/>
  <ellipse cx="712" cy="93" rx="13" ry="5" fill="white" opacity="0.25"/>
  <line x1="699" y1="93" x2="699" y2="107" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="725" y1="93" x2="725" y2="107" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="712" cy="107" rx="13" ry="5" fill="white" opacity="0.15"/>
  <line x1="699" y1="97" x2="725" y2="97" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="699" y1="102" x2="725" y2="102" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="734" y="98" fill="white" font-size="14" font-weight="700">Session Store</text>
  <text x="734" y="114" fill="#d1fae5" font-size="11">Redis / DB</text>
  <text x="734" y="131" fill="#a7f3d0" font-size="10">Server-side state</text>

  <!-- ── LIFELINES ── -->
  <line x1="104" y1="146" x2="104" y2="576" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.6"/>
  <line x1="434" y1="146" x2="434" y2="576" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.6"/>
  <line x1="774" y1="146" x2="774" y2="576" stroke="#6ee7b7" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.6"/>

  <!-- Activation boxes -->
  <rect x="426" y="176" width="16" height="52" rx="3" fill="#7c3aed" opacity="0.4"/>
  <rect x="426" y="360" width="16" height="94" rx="3" fill="#7c3aed" opacity="0.4"/>

  <!-- ── STEP 1 — POST /login ── -->
  <circle cx="104" cy="162" r="14" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="104" y="167" text-anchor="middle" fill="white" font-size="12" font-weight="700">1</text>
  <line x1="119" y1="176" x2="422" y2="176" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="195" y="160" width="188" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="289" y="175" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">POST /login</text>
  <text x="289" y="195" text-anchor="middle" fill="#64748b" font-size="10">{ email, password }</text>

  <!-- ── STEP 2 — Validate + Store Session ── -->
  <circle cx="460" cy="216" r="14" fill="#7c3aed" filter="url(#shadowSm)"/>
  <text x="460" y="221" text-anchor="middle" fill="white" font-size="12" font-weight="700">2</text>
  <line x1="443" y1="228" x2="762" y2="228" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="502" y="212" width="218" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="611" y="227" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="600">Store Session Record</text>
  <text x="611" y="248" text-anchor="middle" fill="#64748b" font-size="10">{ sessionId: "a3f9..", userId: 42, roles, expiry }</text>

  <!-- ── STEP 3 — Set-Cookie ── -->
  <circle cx="420" cy="276" r="14" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="420" y="281" text-anchor="middle" fill="white" font-size="12" font-weight="700">3</text>
  <line x1="421" y1="290" x2="120" y2="290" stroke="#2563eb" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrowBlue)"/>
  <rect x="175" y="274" width="210" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="280" y="289" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">200 OK + Set-Cookie</text>
  <text x="280" y="309" text-anchor="middle" fill="#64748b" font-size="10">sessionId=a3f9..; HttpOnly; Secure; SameSite=Strict</text>

  <!-- ── DIVIDER ── -->
  <rect x="30" y="328" width="840" height="24" rx="6" fill="#e0e7ff" opacity="0.7"/>
  <text x="450" y="344" text-anchor="middle" fill="#4338ca" font-size="11" font-weight="600" letter-spacing="0.8">SUBSEQUENT PROTECTED REQUEST</text>

  <!-- ── STEP 4 — GET /dashboard ── -->
  <circle cx="104" cy="373" r="14" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="104" y="378" text-anchor="middle" fill="white" font-size="12" font-weight="700">4</text>
  <line x1="119" y1="387" x2="422" y2="387" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="186" y="371" width="196" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="284" y="386" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">GET /dashboard</text>
  <text x="284" y="406" text-anchor="middle" fill="#64748b" font-size="10">Cookie: sessionId=a3f9.. (browser auto-sends)</text>

  <!-- ── STEP 5 — Lookup session ── -->
  <circle cx="460" cy="422" r="14" fill="#7c3aed" filter="url(#shadowSm)"/>
  <text x="460" y="427" text-anchor="middle" fill="white" font-size="12" font-weight="700">5</text>
  <line x1="443" y1="436" x2="762" y2="436" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="502" y="420" width="196" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="600" y="435" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="600">GET session "a3f9.."</text>

  <!-- ── STEP 6 — Session data returned ── -->
  <circle cx="760" cy="460" r="14" fill="#059669" filter="url(#shadowSm)"/>
  <text x="760" y="465" text-anchor="middle" fill="white" font-size="12" font-weight="700">6</text>
  <line x1="758" y1="474" x2="444" y2="474" stroke="#059669" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrowGreen)"/>
  <rect x="488" y="458" width="240" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="608" y="473" text-anchor="middle" fill="#065f46" font-size="12" font-weight="600">{ userId: 42, role: "admin" } ✓</text>

  <!-- ── STEP 7 — 200 OK ── -->
  <circle cx="420" cy="502" r="14" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="420" y="507" text-anchor="middle" fill="white" font-size="12" font-weight="700">7</text>
  <line x1="421" y1="516" x2="120" y2="516" stroke="#2563eb" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrowBlue)"/>
  <rect x="185" y="500" width="210" height="20" rx="5" fill="white" filter="url(#shadowSm)" opacity="0.9"/>
  <text x="290" y="515" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">200 OK — Dashboard Data</text>

  <!-- ── KEY NOTE ── -->
  <rect x="30" y="546" width="840" height="58" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="30" y="546" width="7" height="58" rx="4" fill="#f59e0b"/>
  <text x="52" y="566" fill="#b45309" font-size="11" font-weight="700">STATEFUL:</text>
  <text x="125" y="566" fill="#475569" font-size="11">Server must query the session store on every protected request. All server nodes share the same store (e.g. Redis).</text>
  <text x="52" y="584" fill="#475569" font-size="11">Logout is </text>
  <text x="103" y="584" fill="#059669" font-size="11" font-weight="700">instant</text>
  <text x="140" y="584" fill="#475569" font-size="11">— deleting the session record immediately revokes access with no waiting period.</text>
</svg>
