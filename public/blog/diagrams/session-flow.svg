<svg width="900" height="580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="ap" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#10b981"/>
    </marker>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e293b"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#0c1222" rx="16"/>
  <rect width="900" height="580" fill="url(#dots)" rx="16"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="50" fill="#0f172a" rx="16"/>
  <rect x="0" y="36" width="900" height="14" fill="#0f172a"/>
  <rect x="250" y="10" width="400" height="30" rx="7" fill="#1e3a5f"/>
  <text x="450" y="31" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700" letter-spacing="0.8">SESSION-BASED AUTHENTICATION FLOW</text>

  <!-- ─── ACTOR: Browser ─── -->
  <rect x="30" y="62" width="155" height="60" rx="10" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <!-- monitor icon -->
  <rect x="47" y="73" width="26" height="18" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="47" y="89" width="26" height="3" fill="#1e3a5f"/>
  <line x1="60" y1="92" x2="60" y2="97" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="54" y1="97" x2="66" y2="97" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="50" y1="78" x2="69" y2="78" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="83" x2="65" y2="83" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>
  <text x="84" y="82" fill="#93c5fd" font-size="14" font-weight="700">Browser</text>
  <text x="84" y="98" fill="#60a5fa" font-size="11">/ Client</text>

  <!-- ─── ACTOR: Web Server ─── -->
  <rect x="355" y="62" width="175" height="60" rx="10" fill="#2e1065" stroke="#8b5cf6" stroke-width="2"/>
  <!-- server rack icon -->
  <rect x="372" y="72" width="26" height="5" rx="1.5" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <rect x="372" y="80" width="26" height="5" rx="1.5" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <rect x="372" y="88" width="26" height="5" rx="1.5" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="400" cy="74.5" r="2" fill="#4ade80"/>
  <circle cx="400" cy="82.5" r="2" fill="#4ade80"/>
  <circle cx="400" cy="90.5" r="2" fill="#fbbf24"/>
  <text x="412" y="82" fill="#c4b5fd" font-size="14" font-weight="700">Web Server</text>
  <text x="412" y="99" fill="#a78bfa" font-size="11">API / Backend</text>

  <!-- ─── ACTOR: Session Store ─── -->
  <rect x="695" y="62" width="175" height="60" rx="10" fill="#022c22" stroke="#10b981" stroke-width="2"/>
  <!-- db cylinder icon -->
  <ellipse cx="716" cy="75" rx="12" ry="4.5" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <line x1="704" y1="75" x2="704" y2="88" stroke="#34d399" stroke-width="1.5"/>
  <line x1="728" y1="75" x2="728" y2="88" stroke="#34d399" stroke-width="1.5"/>
  <ellipse cx="716" cy="88" rx="12" ry="4.5" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <line x1="704" y1="79" x2="728" y2="79" stroke="#34d399" stroke-width="0.8" opacity="0.4"/>
  <line x1="704" y1="83" x2="728" y2="83" stroke="#34d399" stroke-width="0.8" opacity="0.4"/>
  <text x="738" y="82" fill="#6ee7b7" font-size="14" font-weight="700">Session Store</text>
  <text x="738" y="99" fill="#34d399" font-size="11">Redis / Memory</text>

  <!-- ─── LIFELINES ─── -->
  <line x1="107" y1="122" x2="107" y2="552" stroke="#3b82f6" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>
  <line x1="442" y1="122" x2="442" y2="552" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>
  <line x1="782" y1="122" x2="782" y2="552" stroke="#10b981" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>

  <!-- Activation boxes (shows processing) -->
  <rect x="434" y="165" width="16" height="44" rx="2" fill="#4c1d95" opacity="0.7"/>
  <rect x="434" y="350" width="16" height="86" rx="2" fill="#4c1d95" opacity="0.7"/>

  <!-- ══ STEP 1 ══ POST /login ══ -->
  <circle cx="132" cy="148" r="13" fill="#3b82f6"/>
  <text x="132" y="153" text-anchor="middle" fill="white" font-size="11" font-weight="700">1</text>
  <line x1="122" y1="165" x2="432" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="277" y="158" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">POST /login</text>
  <text x="277" y="176" text-anchor="middle" fill="#475569" font-size="10">{ email: "user@example.com", password: "••••••" }</text>

  <!-- ══ STEP 2 ══ Store session ══ -->
  <circle cx="467" cy="206" r="13" fill="#8b5cf6"/>
  <text x="467" y="211" text-anchor="middle" fill="white" font-size="11" font-weight="700">2</text>
  <line x1="451" y1="222" x2="771" y2="222" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ap)"/>
  <text x="611" y="215" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Store Session Record</text>
  <text x="611" y="232" text-anchor="middle" fill="#475569" font-size="10">{ sessionId: "a3f9..", userId: 42, roles, expiry }</text>

  <!-- ══ STEP 3 ══ Set-Cookie response ══ -->
  <circle cx="418" cy="265" r="13" fill="#3b82f6"/>
  <text x="418" y="270" text-anchor="middle" fill="white" font-size="11" font-weight="700">3</text>
  <line x1="432" y1="279" x2="119" y2="279" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ab)"/>
  <text x="275" y="272" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">200 OK + Set-Cookie</text>
  <text x="275" y="289" text-anchor="middle" fill="#475569" font-size="10">sessionId=a3f9..; HttpOnly; Secure; SameSite=Strict</text>

  <!-- ── SEPARATOR ── -->
  <line x1="50" y1="312" x2="850" y2="312" stroke="#334155" stroke-width="1" stroke-dasharray="3,4"/>
  <rect x="330" y="303" width="240" height="18" rx="5" fill="#1e293b"/>
  <text x="450" y="316" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">SUBSEQUENT PROTECTED REQUEST</text>

  <!-- ══ STEP 4 ══ GET /dashboard ══ -->
  <circle cx="132" cy="345" r="13" fill="#3b82f6"/>
  <text x="132" y="350" text-anchor="middle" fill="white" font-size="11" font-weight="700">4</text>
  <line x1="122" y1="360" x2="432" y2="360" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="277" y="353" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">GET /dashboard</text>
  <text x="277" y="371" text-anchor="middle" fill="#475569" font-size="10">Cookie: sessionId=a3f9.. (browser sends automatically)</text>

  <!-- ══ STEP 5 ══ Lookup session ══ -->
  <circle cx="467" cy="395" r="13" fill="#8b5cf6"/>
  <text x="467" y="400" text-anchor="middle" fill="white" font-size="11" font-weight="700">5</text>
  <line x1="451" y1="410" x2="771" y2="410" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ap)"/>
  <text x="611" y="403" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">GET session "a3f9.."</text>

  <!-- ══ STEP 6 ══ Session data returned ══ -->
  <circle cx="757" cy="432" r="13" fill="#10b981"/>
  <text x="757" y="437" text-anchor="middle" fill="white" font-size="11" font-weight="700">6</text>
  <line x1="770" y1="445" x2="452" y2="445" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ag)"/>
  <text x="611" y="438" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">{ userId: 42, role: "admin" } ✓</text>

  <!-- ══ STEP 7 ══ 200 OK ══ -->
  <circle cx="418" cy="468" r="13" fill="#3b82f6"/>
  <text x="418" y="473" text-anchor="middle" fill="white" font-size="11" font-weight="700">7</text>
  <line x1="432" y1="482" x2="119" y2="482" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ab)"/>
  <text x="275" y="475" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">200 OK — Dashboard Data</text>

  <!-- ── KEY NOTE ── -->
  <rect x="30" y="512" width="840" height="52" rx="9" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="30" y="512" width="6" height="52" rx="3" fill="#f59e0b"/>
  <text x="50" y="532" fill="#fbbf24" font-size="11" font-weight="700">STATEFUL:</text>
  <text x="120" y="532" fill="#9ca3af" font-size="11">Server queries the session store on every protected request. All nodes must share the same store.</text>
  <text x="50" y="549" fill="#9ca3af" font-size="11">Logout is instant — deleting the session record immediately revokes access for that user.</text>
</svg>
